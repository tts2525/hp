<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>一人でグループチャット（改良版2）</title>
  <style>
    :root{
      --me-bg:#dcf8c6;
      --other-bg:#ffffff;
      --accent:#00bfa5;
      --muted:#7b8794;
      --chat-width:820px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
      background: linear-gradient(180deg,#f3f7fb 0%, #ffffff 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }
    .container{
      width:100%;
      max-width:var(--chat-width);
      background:#fff;
      border-radius:12px;
      box-shadow:0 8px 30px rgba(20,30,40,0.08);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      height:82vh;
      min-height:560px;
    }
    header{
      padding:14px 16px;
      background:linear-gradient(90deg,#00bfa5,#00a0d6);
      color:#fff;
      display:flex;
      gap:12px;
      align-items:center;
    }
    header h1{font-size:18px;margin:0}
    header .sub{font-size:12px;opacity:0.95}

    #chatBox{
      flex:1;
      padding:16px;
      overflow-y:auto;
      background:
        linear-gradient(180deg,#f8fbfc,#ffffff);
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .message-row{
      display:flex;
      gap:10px;
      align-items:flex-end;
      max-width:100%;
      width:100%;
    }

    .avatar{
      width:44px;
      height:44px;
      border-radius:50%;
      flex:0 0 44px;
      overflow:hidden;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      color:#fff;
      font-size:14px;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
    }

    .bubble{
      max-width:74%;
      padding:10px 12px;
      border-radius:16px;
      background:var(--other-bg);
      box-shadow:0 1px 0 rgba(0,0,0,0.03);
      position:relative;
      word-break:break-word;
      font-size:15px;
      line-height:1.5;
    }
    .bubble.me{
      background:var(--me-bg);
      border-radius:16px 16px 6px 16px;
    }

    .meta{
      display:flex;
      gap:8px;
      align-items:center;
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
    }
    .name{font-weight:700;font-size:13px;color:#333;margin-bottom:6px}

    /* 自分の行（右寄せ） */
    .row-me{
      justify-content:flex-end;
    }
    .row-me .avatar{
      order:3;
      margin-left:8px;
      margin-right:0;
    }
    .row-me .bubble-wrap{
      order:2;
      align-items:flex-end;
      display:flex;
      flex-direction:column;
      align-self:flex-end;
    }
    /* 他人の行（左寄せ） */
    .msg-other{
      justify-content:flex-start;
    }
    .msg-other .avatar{
      order:1;
      margin-right:8px;
    }
    .msg-other .bubble-wrap{
      order:2;
      align-items:flex-start;
      display:flex;
      flex-direction:column;
    }

    .reply-preview{
      background:rgba(0,0,0,0.04);
      padding:6px 8px;
      border-radius:8px;
      font-size:13px;
      color:#333;
      margin-bottom:8px;
      border-left:3px solid rgba(0,0,0,0.06);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:100%;
    }

    .time{color:var(--muted);font-size:11px}

    .composer{
      padding:12px;
      border-top:1px solid #eef2f4;
      display:flex;
      gap:8px;
      align-items:center;
      background:#fff;
    }
    .composer input[type="text"]{
      flex:1;
      padding:10px 12px;
      border-radius:20px;
      border:1px solid #e6eef0;
      outline:none;
      font-size:15px;
    }
    .composer button{
      background:var(--accent);
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:18px;
      cursor:pointer;
      font-weight:700;
      box-shadow:0 4px 10px rgba(0,191,165,0.12);
    }
    .composer input:focus{box-shadow:0 0 0 3px rgba(0,191,165,0.12)}
    @media (max-width:520px){
      :root{--chat-width:100%}
      .avatar{width:36px;height:36px;font-size:13px}
      .bubble{font-size:15px}
    }
  </style>
</head>
<body>
  <div class="container" role="application" aria-label="一人でグループチャット">
    <header>
      <div style="width:44px;height:44px;border-radius:8px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-weight:700">G</div>
      <div>
        <h1>一人でグループチャット</h1>
        <div class="sub">おじさん構文を自然に、会話の幅を広げました</div>
      </div>
    </header>

    <main id="chatBox" aria-live="polite" aria-atomic="false"></main>

    <form id="messageForm" class="composer" autocomplete="off" aria-label="メッセージ送信フォーム">
      <input id="userMessage" type="text" placeholder="メッセージを入力（Enterで送信、Shift+Enterで改行）" aria-label="メッセージ入力">
      <button type="submit" aria-label="送信">送信</button>
    </form>
  </div>

  <script>
    // キャラ定義
    const characters = [
      {name:"徳川", color:"#ff7043", styleBias:"やや丁寧"},
      {name:"源頼朝", color:"#42a5f5", styleBias:"ぶっきらぼう"},
      {name:"福井 太郎", color:"#7e57c2", styleBias:"世話焼き"},
      {name:"ツイ廃", color:"#26a69a", styleBias:"テンション高め"},
      {name:"アンパン 太郎", color:"#ffca28", styleBias:"おちゃめ"}
    ];

    // 文章断片を大量に用意して組み合わせることで多様性を確保
    const openings = [
      "あのさ", "ねえねえ", "ところで", "そういえば", "おっと", "おはよう", "こんばんは", "やあ"
    ];
    const subjects = [
      "今日の天気", "最近の話題", "その話", "あの映画", "ランチのこと", "旅行の予定", "仕事の愚痴", "趣味のこと"
    ];
    const verbs = [
      "どう思う？", "いいよね", "気になるんだよね", "最高だよ", "ちょっと聞いてよ", "教えてほしいな", "行ってみたいな"
    ];
    const fillers = [
      "ちなみに", "そうそう", "ところでね", "実はね", "余談だけど", "それとね"
    ];
    const closings = [
      "だよ〜", "だゾ", "だヨ", "かな〜", "ね", "よ", "ぞ", "よ（笑）", "だよん"
    ];
    const emojis = ["😄","😂","😅","😎","🥰","🤔","😲","😋","🎶","🌤️","🌧️","🍜","🍺","🧳","✨","💦","🙇‍♂️"];
    const ojisanPhrases = [
      "おぢさんはそう思うヨ", "おじさん、そういうの好きだよ", "花子ちゃん元気かい？", "わっはっは、懐かしいなぁ",
      "また今度飲みに行こうぜ", "無理しないでね、ほんと", "おじさん、ちょっと照れるなぁ"
    ];

    // より自然な日本語を作るためのテンプレート群
    const templates = [
      "{opening}、{subject}が{verb}{emoji}",
      "{opening}、{subject}って{verb}{emoji}",
      "{subject}、{verb} {closing}{emoji}",
      "{filler} {subject}があってね、{verb} {closing}{emoji}",
      "{opening}、{subject}についてだけど、{verb} {ojisan}",
      "{subject}ね、{verb} {closing} {emoji}",
      "{opening}！{subject}が{verb} {ojisan} {emoji}"
    ];

    // ユーティリティ
    function randomPick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
    function escapeHtml(str){ return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    // 文章生成（多様性重視）
    function generateSentenceNatural(){
      const tpl = randomPick(templates);
      const opening = Math.random()<0.6 ? randomPick(openings) : "";
      const subject = randomPick(subjects);
      const verb = randomPick(verbs);
      const filler = Math.random()<0.4 ? randomPick(fillers) : "";
      const closing = Math.random()<0.7 ? randomPick(closings) : "";
      const emoji = Math.random()<0.65 ? " " + randomPick(emojis) : "";
      const ojisan = Math.random()<0.35 ? randomPick(ojisanPhrases) : "";
      let s = tpl
        .replace("{opening}", opening)
        .replace("{subject}", subject)
        .replace("{verb}", verb)
        .replace("{filler}", filler)
        .replace("{closing}", closing)
        .replace("{emoji}", emoji)
        .replace("{ojisan}", ojisan);
      // 微調整：不要な句読点や空白を整える
      s = s.replace(/、\s+、/g,"、").replace(/\s+/g," ").trim();
      // ときどき短い一言を混ぜる
      if(Math.random() < 0.12){
        s += "　" + randomPick(["ほんとだよね","まじで","うんうん","それな"]);
      }
      return s;
    }

    // キャラ口調を付与（語尾や語彙を少し変える）
    function applyCharacterTone(char, baseText){
      // キャラごとのクセを少し付ける
      let text = baseText;
      if(char.name === "徳川"){
        text = text.replace(/ね$/,"ね〜").replace(/かな〜/,"かな〜、だよ");
      } else if(char.name === "源頼朝"){
        text = text.replace(/ね$/,"ぜ").replace(/かな〜/,"かな、だな");
      } else if(char.name === "福井 太郎"){
        text = text + "　おじさんはそう思うよ";
      } else if(char.name === "ツイ廃"){
        text = text + "ｗｗｗ";
      } else if(char.name === "アンパン 太郎"){
        text = text.replace(/ね$/,"ねっ♪").replace(/だよ〜/,"だよ〜っ");
      }
      // ときどきおじさん構文を混ぜる（自然に）
      if(Math.random() < 0.28){
        text += "　" + randomPick(ojisanPhrases);
      }
      return text;
    }

    // DOM作成
    const chatBox = document.getElementById("chatBox");
    const messageForm = document.getElementById("messageForm");
    const userMessage = document.getElementById("userMessage");

    function createMessageElement({who, name, color, text, time, isMe=false, replyTo=null}){
      const row = document.createElement("div");
      row.className = "message-row " + (isMe ? "row-me" : "msg-other");
      row.setAttribute("data-who", name);

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.style.background = color;
      avatar.textContent = name.slice(0,2);

      const bubbleWrap = document.createElement("div");
      bubbleWrap.className = "bubble-wrap";

      if(!isMe){
        const nameEl = document.createElement("div");
        nameEl.className = "name";
        nameEl.textContent = name;
        bubbleWrap.appendChild(nameEl);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble" + (isMe ? " me" : "");
      bubble.setAttribute("role","article");
      bubble.setAttribute("aria-label", name + "のメッセージ: " + text);

      if(replyTo){
        const preview = document.createElement("div");
        preview.className = "reply-preview";
        preview.textContent = (replyTo.name ? replyTo.name + "：" : "") + replyTo.text;
        bubble.appendChild(preview);
      }

      const textEl = document.createElement("div");
      textEl.innerHTML = escapeHtml(text).replace(/\n/g,"<br>");
      bubble.appendChild(textEl);

      const meta = document.createElement("div");
      meta.className = "meta";
      const timeEl = document.createElement("div");
      timeEl.className = "time";
      timeEl.textContent = time;
      meta.appendChild(timeEl);
      bubbleWrap.appendChild(bubble);
      bubbleWrap.appendChild(meta);

      // 配置：自分は右端にavatar、他人は左端にavatar
      if(isMe){
        row.appendChild(bubbleWrap);
        row.appendChild(avatar);
      } else {
        row.appendChild(avatar);
        row.appendChild(bubbleWrap);
      }
      return row;
    }

    function scrollToBottom(smooth=true){
      if(smooth){
        chatBox.scrollTo({top: chatBox.scrollHeight, behavior: "smooth"});
      } else {
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }

    // 自動会話
    let autoRunning = true;
    function scheduleAutoMessage(minDelay=1200, maxDelay=5000){
      const delay = Math.floor(Math.random()*(maxDelay-minDelay)) + minDelay;
      setTimeout(()=>{
        if(!autoRunning) return;
        postAutoMessage();
        scheduleAutoMessage(1000, 6000);
      }, delay);
    }

    function postAutoMessage(){
      const char = randomPick(characters);
      const base = generateSentenceNatural();
      const text = applyCharacterTone(char, base);
      const time = nowTime();

      // ときどきあなたへの返信っぽくする
      let replyTo = null;
      if(Math.random() < 0.36){
        const myMsgs = Array.from(chatBox.querySelectorAll('[data-who="あなた"] .bubble div'));
        if(myMsgs.length){
          const last = myMsgs[myMsgs.length-1];
          const previewText = last.textContent ? last.textContent.slice(0,48) : "";
          if(previewText) replyTo = {name:"あなた", text: previewText};
        }
      }

      const el = createMessageElement({
        who: char.name,
        name: char.name,
        color: char.color,
        text,
        time,
        isMe:false,
        replyTo
      });
      chatBox.appendChild(el);
      scrollToBottom();
    }

    // 初期メッセージ
    function seedInitialMessages(){
      const seeds = [
        {who:"徳川", text:"おはようございます〜、今日はいい日になりそうだね😄"},
        {who:"源頼朝", text:"おう、のんびりいこうぜ"},
        {who:"福井 太郎", text:"コーヒー飲んでるよ、よかったら一緒にどう？☕️"}
      ];
      seeds.forEach(s=>{
        const char = characters.find(c=>c.name===s.who) || characters[0];
        const el = createMessageElement({
          who: char.name,
          name: char.name,
          color: char.color,
          text: s.text,
          time: nowTime(),
          isMe:false
        });
        chatBox.appendChild(el);
      });
      scrollToBottom(false);
    }

    // 送信処理
    messageForm.addEventListener("submit", (e)=>{
      e.preventDefault();
      const raw = userMessage.value || "";
      const text = raw.trim();
      if(!text) return;

      const myEl = createMessageElement({
        who: "あなた",
        name: "あなた",
        color: "#9aa0a6",
        text,
        time: nowTime(),
        isMe:true
      });
      myEl.setAttribute("data-who","あなた");
      chatBox.appendChild(myEl);
      scrollToBottom();

      // 送信後にランダムなキャラが短時間で返信っぽくする
      setTimeout(()=>{
        const replier = randomPick(characters);
        const base = generateSentenceNatural();
        // あなたの一部を引用して自然な返信にする
        const quoted = text.length > 40 ? text.slice(0,40) + "…" : text;
        const replyText = applyCharacterTone(replier, base + "（返信:「" + quoted + "」）");
        const el = createMessageElement({
          who: replier.name,
          name: replier.name,
          color: replier.color,
          text: replyText,
          time: nowTime(),
          isMe:false,
          replyTo: {name:"あなた", text: quoted}
        });
        chatBox.appendChild(el);
        scrollToBottom();
      }, Math.floor(Math.random()*1200)+500);

      userMessage.value = "";
      userMessage.focus();
    });

    // Enter送信、Shift+Enterで改行
    userMessage.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        messageForm.requestSubmit();
      }
    });

    // タブ非アクティブ時は自動会話を抑制
    document.addEventListener("visibilitychange", ()=>{
      if(document.hidden){
        autoRunning = false;
      } else {
        autoRunning = true;
        setTimeout(()=>scheduleAutoMessage(800,3000), 600);
      }
    });

    // リサイズでスクロール安定化
    let resizeTimer;
    window.addEventListener("resize", ()=>{
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(()=>scrollToBottom(false), 200);
    });

    // 初期化
    seedInitialMessages();
    scheduleAutoMessage(800, 3000);
    userMessage.focus();
  </script>
</body>
</html>
