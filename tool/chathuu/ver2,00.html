               /* フッターフォーム */
        #messageForm {

        #userMessage {

        #userMessage:focus {

<body>
    <h1>一人でグルチャット</h1>
    <h3>おじさん構文生成システム搭載（独自開発！）</h3>

    <div class="container">
        <div id="membersBar">
            メンバー:

 <div id="chatBox">

        <form id="messageForm">

    <script>
        /********** おじさん構文用の単語リスト **********/
        const wordLists = [
            ["オハヨー!", "花子ちゃんオハヨー!😂🤣🤗", "お疲れ様〜😎(^o^)", "コンバンワ🥰🥰～"],

            ["連絡くれナイから😓(┬┬﹏┬┬)", "おぢさんは家🏠、で、ヒトリ😭😅😅", "さみしく1人でテレビ📺見てるヨ…"],
            ["カナシイな～＾＾😢（笑）", "会いたい、ナ(*/ω＼*)(^人^)😅", "こんどお茶でもしよウヨ☕️"],
            ["ランチ、でも🍚ド、ウ❓（笑）", "ちょっと😎電話📞できるか、ナ（￣ー￣?）", "旅行🧳いカ、ナイ❓(?_?)（笑）"],
            ["今日、は雨ダネ!😓¬_¬", "今日、は晴れダネ🌤🌤（笑）", "きょう、も、😀😄(❁´◡`❁)"],
            ["楽しい😂😂❤️", "綺麗な^_^^_^", "美しい😍😍😂",かわいいo(*^＠^*)o😍"],
            ["花子チャン😂😂🤣、", "花子ちゃん💕😘（笑）🎶、", "いつもありがとネ😊😊"],
            ["今から寝ようと思ってたのに、(つ∀-)ｵﾔｽﾐｰ😎目が覚めちゃったヨ😅😂😂", "ご飯おいしかったヨ❗😋😋", "もうお布団入ったカ🥱"],
            ["あいたいな🎈🎈🥰(￣y▽,￣)╭ ", "と,o(*^＠^*)o遊びたい🎶😂😂", "いっしょに写真撮りたいネ📸"],
            ["会社をサボるなんて、☆*: .｡. o(≧▽≦)o｡.:*☆😅ダメだゾ🤣", "こんな遅い🌃になにしてるの❓🙄😂", "おじさんは元気だヨ💪", "今度遊ばなイ❓😀"]
        ];

        functionOjisanSentence() {
            const partCount =2 + Math.floor(Math.random() * 3); // 2〜4パート
            let sentence = "";
            for (let i = 0; i < partCount; i++) {
                const listIndex = Math.floor(Math.random() * wordLists.length);
                const wordIndex = Math.floor(Math.random() * wordLists[listIndex].length);
                sentence += wordLists[listIndex][wordIndex];
            }
            return sentence;
        }

        /********** キャラごとのメッセージ **********/
        const characterMessages = {
            "徳川": [
                "天下泰平とはいえ、現代のほうが忙しそうじゃな…📱",
                "城下町の散歩でもせぬか？…いや、今はショッピングモールか😂",
                "家臣たちがLINE覚えたら大変じゃな🤣",
                "忠義とは何か、じっくり語り合いたいものじゃ…",
                "今日の会議も長かったのう…評定より長いぞ😅",
                "そなた、ちゃんと休んでおるか？働きすぎはよくないぞ☕️",
                "現代の兵糧（コンビニ飯）、なかなか侮れぬな…🍙",
                "最近の若者は早寝早起きしておるかの？",
                "将軍もたまにはゴロゴロしたくなるのじゃ…🤤",
                "あの頃よりも、いまのほうが情報戦が激しそうじゃな📡"
            ],
            "源頼朝": [
                "いやいや、現代の合戦はトレンド争いなんだよな〜✨",
                "鎌倉殿もTwitterやってたらバズってたかな？🤔",
                "鎌倉まで通勤電車で通うの、地味につらそう😂",
                "武士もつらいけど、社畜もなかなかだな…💼",
                "最近の鎌倉は観光客多いらしいな～行きたい😎",
                "源氏の白旗より、通知の白丸のほうが怖くない？📲",
                "エゴサしてたら眠れなくなったわ…😇",
                "歴史の教科書に自分の名前あるの、やっぱ不思議だよなぁ",
                "武士の情けで、今日は早く寝ろ😴",
               鎌倉殿の13人、ちゃんと全部見た？👀"
            ],
            "福井 太郎": [
                "今日はあんや、仕事はかどったけ？💻",
                "福井は雪すごいやけど、そっちはどうね？⛄️                "ソースカツ丼食べたくなってきたわ…🤤",
                "北陸新幹線、乗ってみたいのぉ🚄",
                "なんかさー、急に青春時代思い出してしまったわ😌",
                "はよ帰ってゴロゴロしたいわ～",
                "あんまり無理しすぎんようにしなよ？",
                "ゲームでもしながらダラダラしたい気分わ🎮",
                "あ、そうそう、最近面白いマンガ見つけてん📚",
                "ラーメン食べこって話、まだ生きてる？🍜"
            ],
            "ツイ廃": [
                "さっきの話、マジでバズりそうなんだけどｗｗｗ",
                "通知止まらん…誰か助けて…📱",
                "それ、タイムラインで見た気がする…ジャヴ…😇",
                "エゴサしてたら日が暮れてたんだが？😂",
                "インプレッションが全てじゃないって分かってるけどさ…",
                "最近X(旧Twitter)の仕様変更ついけない😇",
                "いいねよりリプくれ派です🙋‍♂️",
                "TLがカオスで脳が溶けてる…",
                "寝る寝る詐欺してたらこんな時間なんだが🌙",
                "今日も供給が良すぎて感謝🙏"
            ],
            "アンパン 太郎": [
                "さっきパン屋寄ったんだけど、限定クリームパン優勝してた🍞",
                "お腹すいてきた…夜食どうしよう🤔",
                "あんパンと牛乳の組み合わせ、ガチで最強説🥛",
                "おいしいもの食べてるときが一番幸せだよね😌",
                "最近ちょっと太ったかも…まぁいっか😂",
                "ラーメンかカレーか焼肉か…迷う～😋",
                "おすすめのパン屋あったら教！🥐",
                "コンビニの新作スイーツチェックした？🍰",
                "食べ放題って言葉に弱いんだよねぇ…",
                "お腹空いてない？なにか食べた？🍙"
            ]
        };

        /********** 共通の雑談メッージ（誰でも） **********/
        const commonMessages = [
            "それってどういうこと？🤔",
            "あなたの話、すごく面白いよ！😄",
            "なんだか懐かしい話だね🥲",
            "私もその経験があるよ！😊",
            "え？それ本当に？😲",
            "面白いことがあったら教えて！🤗",
            "ふーん、それは初めて聞いた！😯",
            "今日は何をした？🙂",
            "最近読んだ本の話を聞かせて！📚",
            "私は今、コーヒーを飲んでるよ☕️",
            "ちなみに、私は猫派だよ！🐱",
            "昨日の夜、星を見た？🌟",
            "今週末は何の予定？📅",
           旅行に行くなら、どこに行きたい？🌍            "私の好きな映画はインセプションだよ🎥",
            "最近、新しい趣味を見つけたんだ",
            "あなたの好きな音楽は何？🎵",
            "最後に笑ったのはいつ？😂",
            "季節の変わり、体調管理大丈夫？😷",
            "一緒にゲームしよう！🎮",
            "最近見た映画はどうだった？🎞️",
            "おすすめのレストラン知ってる？🍽️",
            "一番好きな休日の過ごし方は🏖️",
            "なんとなく、今日はいい日な気がするんだ😊",
            "たまにはゆっくり休んでね😌",
            "愛してますよ！！",
            "僕の家はどこですか?",
            generateOjisanSentence(),
            generateOjisanSentence(),
            generateOjisanSentence()
        ];

        const names = ["徳川", "源頼朝", "福井 太郎", "ツイ廃", "アンパン 太郎"];

        const chatBox = document.getElementById("chatBox");
        const messageForm = document.getElementById("messageForm");
        const userMessageInput = document.getElementById("userMessage");

        let lastUserMessageTime =0;
        let botTimerId = null;
        let botActive = true;

        /********** 時刻フォーマット **********/
        function formatTime(date = new Date()) {
            const = String(date.getHours()).padStart(2, "0");
            const m = String(date.getMinutes()).padStart(2, "0");
            return `${h}:${m}`;
        }

        /********** メッセージ追加（共通） **********/
        function appendMessageElement(el) {
            const isAtBottom = chatBox.scrollTop + chatBox.clientHeight >= chatBox.scrollHeight - 5;
            chatBox.appendChild(el);
            if (isAtBottom) {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function add({ name,, type }) {
            const row = document.createElement("div");
            row.classList.add("message-row");
            row.classList.add(type === "me" ? "me" :other");

            const bubble = document.createElement("div");
            bubble.classList.add("bubble");
            bubble.classList.add(type === "me" ? "bubble-me" : "bubble-other");

            const nameSpan = document.createElement("div");
            nameSpan.classList.add("name");

            const timeSpan = document.createElement("div");
            timeSpan.classList.add("time");
            timeSpan.textContent = formatTime();

            const textDiv = document.createElement("div");
            textDiv.classList.add("text");
            textDivContent = text;

            if (type === "") {
                nameSpan.textContent = "あなた";
                nameSpan.classList.add("name-me");
                bubble.appendChild(nameSpan);
                bubble.appendChild(text);
                bubble.appendChild(timeSpan);
                row.appendChild(bubble);
                const avatar = document.createElement("div");
                avatar.classList.add("avatar", "avatar-me");
                avatar.textContent = "あな";
                row.appendChild(avatar);
            } else {
                // 他メンバー
                let nameClass = "";
                let avatarColor = "#999";
                let avatarLabel = "";

                if (name === "徳川") {
                    nameClass = "name-tokugawa";
                    avatarColor = "#0066cc";
                    avatarLabel = "徳";
                } else if (name === "源頼朝") {
                    nameClass = "name-minamoto";
                    avatarColor = "#008000";
                    avatarLabel = "源";
                } else if (name === "福井 太郎") {
                    nameClass = "name-fukui";
                    avatarColor = "#b5651d";
 avatarLabel = "福";
                } else if (name === "ツイ廃") {
                    nameClass = "name-twihai";
                    avatarColor = "#aa00aa";
                    avatarLabel = "廃";
                } else if (name === "アンパン 太郎") {
                    nameClass = "name-anpan";
                    avatarColor = "#d35400";
                    avatarLabel = "あ";
                }

                const avatar = document.createElement("div");
                avatar.classList.add("avatar");
                avatar.style.backgroundColor = avatarColor;
                avatar.textContent = avatarLabel || name[0];

                nameSpan.textContent = name;
                if (nameClass) nameSpan.classList.add(nameClass);

                bubble.append(nameSpan);
                bubble.appendChild(text);
                bubble.appendChild(timeSpan);

                row.appendChild(avatar);
                row.appendChild(bubble);
            }

            appendMessageElement(row);
        }

        /********** ボットメッセージ生成 **********/
        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function createRandomBotMessage() {
            const name = getRandomElement(names);
            const charMsgs characterMessages[name] || [];
            let text;
            if (Math.random() < 0.3) {
                // 30% くらいでおじさん構文
                text = generateOjisanSentence();
            } else if (Math.random() < 0.5 && charMsgs.length > 0) {
                // キャラ固有のメッセージ
                text = getRandomElement(charMsgs);
            } else {
                // 共通メッセージ
                text = getRandomElement(commonMessages);
            }
            return { name, text };
        }

        /********** ボットの自動投稿 **********/
        function scheduleNextBotMessage() {
            if (!botActive) return;

            const now = Date.now();
            let delay;
            // ユーザー発言の5秒以内は控えめに
            if (now - lastUserMessageTime < 5000) {
                delay = 3000 + Math.random() * 4000; // 3〜7秒
            } else {
                delay = 1000 + Math.random() * 3000; // 1〜4秒
            }

            botTimerId = setTimeout(() => {
                // 再度チェック（直近でユーザー発言があったかもしれない）
                const now2 = Date.now();
 if (now2 - lastUserMessageTime < 1500) {
                    scheduleNextBotMessage();
                    return;
                }

                const { name, text } = createRandomBotMessage();
                addMessage({ name, text, type: "other" });
                scheduleNextBotMessage();
            }, delay);
        }

        /********** ユーザー発言に対する「返信」っぽい挙動 **********/
        function scheduleReplyToUser(userText) {
            // 一人が軽く返事する感じ
            const delay = 800 + Math.random() * 2000; // 0.8〜2.8秒
            setTimeout(() => {
                const name = getRandomElement(names);
                let reply;

                // 超簡易：ユーザー発言に単語を差し込む
                const trimmed = userText.trim();
                if (trimmed.length > 0 && Math.random() < 0.6) {
                    const words = trimmed.split(/\s+/);
                    const pick = getRandomElement(words);
                    reply = `${pick}って、なんかいいね😄`;
                    if (pick.length > 15) {
                        reply = "さっきの話、なんか深かった…🤔";
                    }
                } else {
                    const charMsgs = characterMessages[name] || [];
                    if (charMsgs.length > 0 && Math.random() < 0.6) {
                        reply = getRandomElement(charMsgs);
                    } else {
                        reply = getRandomElement(commonMessages);
                    }
                }

                addMessage({ name, text: reply, type: "other" });
            }, delay);
        }

        /********** フォーム送信処理 **********/
        messageForm.addEventListener("submit", functione) {
            e.preventDefault();
            const text = userMessageInput.value;
            if (text.trim() === "") return;

            addMessage({ name: "あなた", text, type: "me" });
            lastUserMessageTime = Date.now();
            userMessageInput.value = "";
            userMessageInput.focus();

            scheduleReplyToUser(text);
        });

        // Enterで送信 / Shift+Enterで改行
        userMessageInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                messageForm.requestSubmit();
            }
        });

        /********** 初期化 **********/
        // 最初にちょっとだけメッセージを流しておく
        function initChat() {
            const initialCount = 3 + Math.floor(Math.random() * 3); // 3〜5件
            for (let i = 0; i < initialCount; i++) {
                const { name, text } = createRandomBotMessage();
                addMessage({ name, text, type: "other" });
            }
        }

        initChat();
        scheduleNextBotMessage();
    </script>
</body>

</html>
