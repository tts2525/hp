<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>一人でグループチャット（改良版）</title>
  <style>
    :root{
      --me-bg:#dcf8c6;
      --other-bg:#ffffff;
      --accent:#00bfa5;
      --muted:#9aa0a6;
      --chat-width:720px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", Arial, sans-serif;
      background: linear-gradient(180deg,#f0f4f8 0%, #ffffff 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:var(--chat-width);
      background:#fff;
      border-radius:12px;
      box-shadow:0 8px 30px rgba(20,30,40,0.08);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      height:80vh;
      min-height:560px;
    }

    header{
      padding:14px 16px;
      background:linear-gradient(90deg,#00bfa5,#00a0d6);
      color:#fff;
      display:flex;
      align-items:center;
      gap:12px;
    }
    header h1{
      font-size:18px;
      margin:0;
      letter-spacing:0.02em;
    }
    header .sub{font-size:12px;opacity:0.95}

    /* chat area */
    #chatBox{
      flex:1;
      padding:16px;
      overflow-y:auto;
      background:
        radial-gradient(circle at 10% 10%, rgba(0,0,0,0.01), transparent 10%),
        linear-gradient(180deg,#f8fbfc,#ffffff);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .message-row{
      display:flex;
      gap:10px;
      align-items:flex-end;
      max-width:100%;
    }

    /* other (left) */
    .msg-other{
      align-self:flex-start;
    }
    .avatar{
      width:44px;
      height:44px;
      border-radius:50%;
      flex:0 0 44px;
      overflow:hidden;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      color:#fff;
      font-size:14px;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
    }

    .bubble{
      max-width:72%;
      padding:10px 12px;
      border-radius:16px;
      background:var(--other-bg);
      box-shadow:0 1px 0 rgba(0,0,0,0.03);
      position:relative;
      word-break:break-word;
      font-size:14px;
      line-height:1.4;
    }

    .bubble.me{
      background:var(--me-bg);
      border-radius:16px 16px 6px 16px;
    }

    .meta{
      display:flex;
      gap:8px;
      align-items:center;
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
    }

    .name{
      font-weight:700;
      font-size:13px;
      color:#333;
      margin-bottom:6px;
    }

    /* right (me) */
    .row-me{
      align-self:flex-end;
      flex-direction:row-reverse;
    }
    .bubble.me{
      max-width:72%;
    }

    /* reply preview */
    .reply-preview{
      background:rgba(0,0,0,0.03);
      padding:6px 8px;
      border-radius:8px;
      font-size:12px;
      color:#333;
      margin-bottom:8px;
      border-left:3px solid rgba(0,0,0,0.06);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    /* timestamp */
    .time{
      color:var(--muted);
      font-size:11px;
    }

    /* input area */
    .composer{
      padding:12px;
      border-top:1px solid #eef2f4;
      display:flex;
      gap:8px;
      align-items:center;
      background:#fff;
    }
    .composer input[type="text"]{
      flex:1;
      padding:10px 12px;
      border-radius:20px;
      border:1px solid #e6eef0;
      outline:none;
      font-size:14px;
    }
    .composer button{
      background:var(--accent);
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:18px;
      cursor:pointer;
      font-weight:700;
      box-shadow:0 4px 10px rgba(0,191,165,0.12);
    }
    .composer button:active{transform:translateY(1px)}
    .small{
      font-size:12px;color:var(--muted)
    }

    /* mobile tweaks */
    @media (max-width:520px){
      :root{--chat-width:100%}
      .avatar{width:36px;height:36px;font-size:13px}
      .bubble{font-size:15px}
    }

    /* accessibility focus */
    .composer input:focus{box-shadow:0 0 0 3px rgba(0,191,165,0.12)}
    .sr-only{position:absolute;left:-9999px}
  </style>
</head>
<body>
  <div class="container" role="application" aria-label="一人でグループチャット">
    <header>
      <div style="width:44px;height:44px;border-radius:8px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-weight:700">G</div>
      <div>
        <h1>一人でグループチャット</h1>
        <div class="sub">おじさん構文で自動会話を楽しもう</div>
      </div>
    </header>

    <main id="chatBox" aria-live="polite" aria-atomic="false">
      <!-- メッセージがここに入る -->
    </main>

    <form id="messageForm" class="composer" autocomplete="off" aria-label="メッセージ送信フォーム">
      <input id="userMessage" type="text" placeholder="メッセージを入力（Enterで送信）" aria-label="メッセージ入力">
      <button type="submit" aria-label="送信">送信</button>
    </form>
  </div>

  <script>
    // --- キャラ定義（名前・色・口調テンプレ） ---
    const characters = [
      {
        name: "徳川",
        color: "#ff7043",
        tones: [
          "おはようさんだヨ〜、{text}よ〜＾＾",
          "おぢさん、{text}って思ったヨ（笑）",
          "花子ちゃん、{text}だゾ〜（笑）"
        ]
      },
      {
        name: "源頼朝",
        color: "#42a5f5",
        tones: [
          "おう、{text}だな。わっはっは",
          "それは良い、{text}じゃないかい？",
          "頼朝も賛成だヨ、{text}よ"
        ]
      },
      {
        name: "福井 太郎",
        color: "#7e57c2",
        tones: [
          "おじさん的にはね、{text}って感じだよ〜",
          "ふむふむ、{text}かぁ、なるほどね〜",
          "おぢさん、{text}でウキウキだヨ"
        ]
      },
      {
        name: "ツイ廃",
        color: "#26a69a",
        tones: [
          "マジで{text}！？ｗｗｗ",
          "それな〜、{text}って感じ〜",
          "ツイ廃的には{text}が神"
        ]
      },
      {
        name: "アンパン 太郎",
        color: "#ffca28",
        tones: [
          "アンパンマンも言ってたよ、{text}だって",
          "おじさん、{text}でニコニコだヨ",
          "おぢさん、{text}って言ってみたヨ"
        ]
      }
    ];

    // --- メッセテンプレ・語尾バリエーション・絵文字 ---
    const baseMessages = [
      "それってどういうこと？",
      "すごく面白いよ！",
      "懐かしい話だね",
      "私もその経験があるよ",
      "え？それ本当に？",
      "面白いことがあったら教えて！",
      "今日は何をした？",
      "おすすめのレストラン知ってる？",
      "旅行に行くならどこ？",
      "最近のハマりごとは？",
      "今コーヒー飲んでるよ",
      "猫派？犬派？",
      "今週末は何する？"
    ];
    const emojis = ["😄","😂","😅","😎","🥰","🤔","😲","😋","🎶","🌤️","🌧️","🍜","🍺","🧳"];
    const endings = ["よ〜","だゾ","だヨ","かな〜","ね","だね","よ","ぞ","よ（笑）","な〜"];

    // --- ユーティリティ ---
    function nowTime(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,"0");
      const mm = String(d.getMinutes()).padStart(2,"0");
      return `${hh}:${mm}`;
    }

    function randomPick(arr){
      return arr[Math.floor(Math.random()*arr.length)];
    }

    // --- メッセージ生成（キャラ口調＋おじさん構文） ---
    function generateCharacterMessage(char){
      // ベース文を選び、口調テンプレに埋める
      const base = randomPick(baseMessages);
      const emoji = Math.random() < 0.6 ? " " + randomPick(emojis) : "";
      const ending = Math.random() < 0.6 ? randomPick(endings) : "";
      const toneTemplate = randomPick(char.tones);
      // 口調テンプレに base を埋める
      let text = toneTemplate.replace("{text}", base + ending + emoji);
      // ときどき長文を作る（バリエーション）
      if(Math.random() < 0.25){
        text += "　" + randomPick(["ほんとだヨ〜","また今度ね","それでね…","ちなみにね〜"]);
      }
      return text;
    }

    // --- DOM操作 ---
    const chatBox = document.getElementById("chatBox");
    const messageForm = document.getElementById("messageForm");
    const userMessage = document.getElementById("userMessage");

    // メッセージ要素を作る
    function createMessageElement({who, name, color, text, time, isMe=false, replyTo=null}){
      const row = document.createElement("div");
      row.className = "message-row " + (isMe ? "row-me" : "msg-other");
      row.setAttribute("data-who", name);

      // avatar
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.style.background = color;
      avatar.textContent = name.slice(0,2);

      // bubble
      const bubbleWrap = document.createElement("div");
      bubbleWrap.style.display = "flex";
      bubbleWrap.style.flexDirection = "column";
      bubbleWrap.style.alignItems = isMe ? "flex-end" : "flex-start";

      const bubble = document.createElement("div");
      bubble.className = "bubble" + (isMe ? " me" : "");
      bubble.setAttribute("role","article");
      bubble.setAttribute("aria-label", name + "のメッセージ: " + text);

      // 名前（他人のみ）
      if(!isMe){
        const nameEl = document.createElement("div");
        nameEl.className = "name";
        nameEl.textContent = name;
        bubbleWrap.appendChild(nameEl);
      }

      // 返信プレビュー
      if(replyTo){
        const preview = document.createElement("div");
        preview.className = "reply-preview";
        preview.textContent = (replyTo.name ? replyTo.name + "：" : "") + replyTo.text;
        bubble.appendChild(preview);
      }

      // メインテキスト
      const textEl = document.createElement("div");
      textEl.innerHTML = escapeHtml(text).replace(/\n/g,"<br>");
      bubble.appendChild(textEl);

      // メタ（時間）
      const meta = document.createElement("div");
      meta.className = "meta";
      const timeEl = document.createElement("div");
      timeEl.className = "time";
      timeEl.textContent = time;
      meta.appendChild(timeEl);

      bubbleWrap.appendChild(bubble);
      bubbleWrap.appendChild(meta);

      if(isMe){
        row.appendChild(bubbleWrap);
        row.appendChild(avatar);
      } else {
        row.appendChild(avatar);
        row.appendChild(bubbleWrap);
      }

      return row;
    }

    // XSS対策の簡易エスケープ
    function escapeHtml(str){
      return String(str)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    // スクロールを底に合わせる（新着が見えるように）
    function scrollToBottom(smooth=true){
      if(smooth){
        chatBox.scrollTo({top: chatBox.scrollHeight, behavior: "smooth"});
      } else {
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }

    // --- 自動会話ロジック ---
    let autoRunning = true;

    // ランダムにキャラが発言する（グループ感）
    function scheduleAutoMessage(minDelay=1200, maxDelay=5000){
      const delay = Math.floor(Math.random()*(maxDelay-minDelay)) + minDelay;
      setTimeout(()=>{
        if(!autoRunning) return;
        postAutoMessage();
        // 次をスケジュール
        scheduleAutoMessage(1000, 6000);
      }, delay);
    }

    function postAutoMessage(){
      const char = randomPick(characters);
      const text = generateCharacterMessage(char);
      const time = nowTime();

      // ときどき「あなた」への返信っぽくする
      let replyTo = null;
      if(Math.random() < 0.35){
        // 最近のあなたの発言を引用（あれば）
        const myMsgs = Array.from(chatBox.querySelectorAll('[data-who="あなた"] .bubble'));
        if(myMsgs.length){
          const last = myMsgs[myMsgs.length-1];
          const previewText = last.querySelector('div') ? last.querySelector('div').textContent.slice(0,40) : "";
          replyTo = {name:"あなた", text: previewText};
        }
      }

      const el = createMessageElement({
        who: char.name,
        name: char.name,
        color: char.color,
        text,
        time,
        isMe:false,
        replyTo
      });
      chatBox.appendChild(el);
      scrollToBottom();
    }

    // --- 初期プリセットメッセージを少し入れる ---
    function seedInitialMessages(){
      const seeds = [
        {who:"徳川", text:"おはようさんだヨ〜、今日はいい天気だね〜😄"},
        {who:"源頼朝", text:"おう、今日はのんびりしようぜ"},
        {who:"福井 太郎", text:"おじさん、コーヒー飲んでるよ☕️"},
      ];
      seeds.forEach(s=>{
        const char = characters.find(c=>c.name===s.who) || characters[0];
        const el = createMessageElement({
          who: char.name,
          name: char.name,
          color: char.color,
          text: s.text,
          time: nowTime(),
          isMe:false
        });
        chatBox.appendChild(el);
      });
      scrollToBottom(false);
    }

    // --- 送信処理（あなた） ---
    messageForm.addEventListener("submit", (e)=>{
      e.preventDefault();
      const raw = userMessage.value || "";
      const text = raw.trim();
      if(!text) return; // 空メッセージ防止

      // あなたのメッセージを追加
      const myEl = createMessageElement({
        who: "あなた",
        name: "あなた",
        color: "#999",
        text,
        time: nowTime(),
        isMe:true
      });
      // マークしておく（data-who）
      myEl.setAttribute("data-who","あなた");
      chatBox.appendChild(myEl);
      scrollToBottom();

      // 送信後、短い遅延で自動的に誰かが返信っぽくする
      setTimeout(()=>{
        // 返信者を選ぶ（ランダム）
        const replier = randomPick(characters);
        // 返信文はあなたの発言を参照して生成
        const replyBase = generateCharacterMessage(replier);
        // 返信っぽくするためにあなたの一部を引用
        const quoted = text.length > 40 ? text.slice(0,40) + "…" : text;
        const replyText = replyBase + "（返信:「" + quoted + "」）";
        const el = createMessageElement({
          who: replier.name,
          name: replier.name,
          color: replier.color,
          text: replyText,
          time: nowTime(),
          isMe:false,
          replyTo: {name:"あなた", text: quoted}
        });
        chatBox.appendChild(el);
        scrollToBottom();
      }, Math.floor(Math.random()*1200)+600);

      // 入力をクリア
      userMessage.value = "";
      userMessage.focus();
    });

    // --- キーボードでEnter送信（Shift+Enterで改行） ---
    userMessage.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        messageForm.requestSubmit();
      }
    });

    // --- 初期化 ---
    seedInitialMessages();
    scheduleAutoMessage(800, 3000);

    // --- 追加の改善: 自動停止/再開（タブ非アクティブ時は抑制） ---
    document.addEventListener("visibilitychange", ()=>{
      if(document.hidden){
        autoRunning = false;
      } else {
        autoRunning = true;
        // 少し遅らせて再開
        setTimeout(()=>scheduleAutoMessage(800,3000), 600);
      }
    });

    // --- 追加: 画面リサイズでスクロールを安定化 ---
    let resizeTimer;
    window.addEventListener("resize", ()=>{
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(()=>scrollToBottom(false), 200);
    });

    // --- 初期フォーカス ---
    userMessage.focus();
  </script>
</body>
</html>
