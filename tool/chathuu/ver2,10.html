<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>一人グループチャットver2.10</title>
<style>
  :root{
    --me-bg:#dcf8c6; --other-bg:#fff; --accent:#00bfa5; --muted:#7b8794;
    --max-width:900px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Noto Sans JP", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
    background:linear-gradient(180deg,#f3f7fb,#ffffff); display:flex; justify-content:center; padding:20px;
  }
  .container{width:100%; max-width:var(--max-width); background:#fff; border-radius:12px; box-shadow:0 8px 30px rgba(20,30,40,0.08); display:flex; flex-direction:column; height:86vh; min-height:560px; overflow:hidden;}
  header{padding:14px 16px; background:linear-gradient(90deg,#00bfa5,#00a0d6); color:#fff; display:flex; gap:12px; align-items:center;}
  header h1{font-size:18px;margin:0}
  #chatBox{flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; background:linear-gradient(180deg,#f8fbfc,#ffffff);}
  .message-row{display:flex; gap:10px; align-items:flex-end; width:100%;}
  .avatar{width:44px;height:44px;border-radius:50%;flex:0 0 44px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
  .bubble{max-width:74%; padding:10px 12px; border-radius:16px; background:var(--other-bg); box-shadow:0 1px 0 rgba(0,0,0,0.03); word-break:break-word; font-size:15px; line-height:1.5;}
  .bubble.me{background:var(--me-bg); border-radius:16px 16px 6px 16px;}
  .meta{display:flex; gap:8px; align-items:center; margin-top:6px; font-size:12px; color:var(--muted);}
  .name{font-weight:700;font-size:13px;color:#333;margin-bottom:6px}
  .row-me{justify-content:flex-end}
  .row-me .avatar{order:3;margin-left:8px}
  .row-me .bubble-wrap{order:2;align-items:flex-end;display:flex;flex-direction:column;align-self:flex-end}
  .msg-other{justify-content:flex-start}
  .msg-other .avatar{order:1;margin-right:8px}
  .msg-other .bubble-wrap{order:2;align-items:flex-start;display:flex;flex-direction:column}
  .reply-preview{background:rgba(0,0,0,0.04); padding:6px 8px; border-radius:8px; font-size:13px; color:#333; margin-bottom:8px; border-left:3px solid rgba(0,0,0,0.06); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .time{color:var(--muted);font-size:11px}
  .controls{display:flex;gap:8px;align-items:center}
  .btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:4px 6px;border-radius:6px}
  .btn:hover{background:rgba(0,0,0,0.04)}
  .composer{padding:12px;border-top:1px solid #eef2f4;display:flex;gap:8px;align-items:center;background:#fff}
  .composer input[type="text"]{flex:1;padding:10px 12px;border-radius:20px;border:1px solid #e6eef0;outline:none;font-size:15px}
  .composer button{background:var(--accent);color:#fff;border:none;padding:10px 14px;border-radius:18px;cursor:pointer;font-weight:700}
  .newBadge{position:fixed;right:28px;bottom:110px;background:#ff5252;color:#fff;padding:8px 12px;border-radius:20px;box-shadow:0 6px 18px rgba(0,0,0,0.12);cursor:pointer;display:none}
  .small{font-size:12px;color:var(--muted)}
  .edited{font-size:11px;color:var(--muted);margin-left:6px}
  .deleted{font-style:italic;color:var(--muted)}
  .like-count{font-size:12px;color:var(--muted);margin-left:6px}
  @media (max-width:520px){.avatar{width:36px;height:36px;font-size:13px}.bubble{font-size:15px}}
</style>
</head>
<body>
  <div class="container" role="application" aria-label="一人でグループチャット">
    <header>
      <div style="width:44px;height:44px;border-radius:8px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-weight:700">G</div>
      <div>
        <h1>一人でグループチャット-ver2.10</h1>
        <div class="small">一人でグループチャットを楽しめる革命的アプリ</div>
      </div>
    </header>

    <main id="chatBox" aria-live="polite" aria-atomic="false"></main>

    <form id="messageForm" class="composer" autocomplete="off" aria-label="メッセージ送信フォーム">
      <input id="userMessage" type="text" placeholder="メッセージを入力（Enterで送信、Shift+Enterで改行）" aria-label="メッセージ入力">
      <button type="submit" aria-label="送信">送信</button>
    </form>
  </div>

  <div id="newBadge" class="newBadge">新着</div>

<script>
/* -------------------------
   データモデルと永続化
   ------------------------- */
const STORAGE_KEYS = { MESSAGES: 'chat_messages_v2', TEMPLATES: 'chat_templates_v2' };
let messages = []; 
let templates = []; 
const MAX_MESSAGES = 800;

// 初期テンプレ（バリエーション増強）
function initDefaultTemplates(){
  const base = [
    "{opening}、{subject}が{verb}{emoji}",
    "{opening}、{subject}って{verb}{emoji}",
    "{filler} {subject}についてだけど、{verb} {closing}{emoji}",
    "{subject}、{verb} {closing}{emoji}",
    "{opening}！{subject}が{verb} {ojisan}{emoji}",
    "{subject}ね、{verb} {closing} {emoji}",
    "最近{subject}が{verb}から、なんだか{verb}{closing}{emoji}",
    "{opening}、{filler}{subject}って{verb}？{emoji}",
    "{subject}の件、{verb}{closing}！{emoji}",
    "{filler}{subject}のこと考えてたら、急に{verb}って思って{closing}{emoji}"
  ];
  templates = base.map((t,i)=>({id:'tpl_'+i, tpl:t, weight:1}));
  saveTemplates();
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEYS.MESSAGES);
    messages = raw ? JSON.parse(raw) : [];
  }catch(e){ messages = []; }
  try{
    const raw2 = localStorage.getItem(STORAGE_KEYS.TEMPLATES);
    templates = raw2 ? JSON.parse(raw2) : [];
    if(!templates || templates.length===0) initDefaultTemplates();
  }catch(e){ initDefaultTemplates(); }
}
function saveMessages(){ try{ localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(messages)); }catch(e){} }
function saveTemplates(){ try{ localStorage.setItem(STORAGE_KEYS.TEMPLATES, JSON.stringify(templates)); }catch(e){} }

/* -------------------------
   キャラ定義・断片（バリエーション増強）
   ------------------------- */
const characters = [
  {name:"徳川", color:"#ff7043"},
  {name:"源頼朝", color:"#42a5f5"},
  {name:"福井 太郎", color:"#7e57c2"},
  {name:"ツイ廃", color:"#26a69a"},
  {name:"アンパン 太郎", color:"#ffca28"}
];

const openings = ["あのさ","ねえねえ","ところで","そういえば","おっと","おはよう","こんばんは","やあ","さて","やっほー","お疲れ様！","聞いて聞いて","ちょっといい？","いま暇？","ふと思ったんだけど","突然ごめん","そういや","ヤバい","えっと"];
const subjects = ["今日の天気","最近の話題","その話","あの映画","ランチ","旅行の予定","仕事のこと","趣味のこと","音楽","晩ごはん","昨日のテレビ","新しいスマホ","週末の予定","推しのこと","仕事の進捗","飼ってるペット","近所の猫","最近読んだ本","ダイエット","運動不足","睡眠不足","天気痛","最近のAI","新しいカフェ","コンビニの新作","ゲーム","投資","節約"];
const verbs = ["どう思う？","いいよね","気になるんだよね","最高だよ","ちょっと聞いてよ","教えてほしいな","行ってみたいな","やってみたら？","気になっててさ","どうしたもんかと思って","おすすめある？","教えて！","最高すぎない？","微妙だったんだよね","ハマってるんだ","試してみたい","どうにかならないかな","解決したい","ヤバくない？","笑っちゃった","泣ける","感動した","疲れた","癒やされたい"];
const fillers = ["ちなみに","そうそう","ところでね","実はね","余談だけど","それとね","ぶっちゃけ","ここだけの話","前にも言ったかもだけど","どうでもいいかもだけど","思い過ごしかもしれないけど","あとさ","ていうか"];
const closings = ["だよ〜","だゾ","だヨ","かな〜","ね","よ","ぞ","よ（笑）","だよん","だよね","かも","と思うんだ","なーって","どう？","だわ","って感じ","だったりする？","かもね","なぁ","っすね"];
const emojis = ["😄","😂","😅","😎","🥰","🤔","😲","😋","🎶","🌤️","🌧️","🍜","🍺","🧳","✨","💦","🙇‍♂️","🎉","🔥","👍","👀","🥺","🤯","☕","🍰","🎮","🚀","🐱","🐶","🛌"];
const ojisanPhrases = ["おぢさんはそう思うヨ","おじさん、そういうの好きだよ","花子ちゃん元気かい？","わっはっは、懐かしいなぁ","また今度飲みに行こうぜ","無理しないでね、ほんと","今日も一日お疲れ様！","ナンチャッテ！","おじさん、最近腰が痛くてねぇ","若いって素晴らしいネ","おぢさんも混ぜてほしいナ","今度カラオケ行こうヨ","ビールがうまい季節だねぇ"];

/* -------------------------
   ユーティリティ
   ------------------------- */
function uid(prefix='id'){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function randomPick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function escapeHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* -------------------------
   重み付きテンプレ選択と生成
   ------------------------- */
function weightedPick(list){
  const total = list.reduce((s,i)=>s+(i.weight||1),0);
  let r = Math.random()*total;
  for(const item of list){
    r -= (item.weight||1);
    if(r <= 0) return item;
  }
  return list[list.length-1];
}

function generateBaseSentence(){
  const tplObj = weightedPick(templates);
  const tpl = tplObj.tpl;
  const opening = Math.random()<0.6 ? randomPick(openings) : "";
  const subject = randomPick(subjects);
  const verb = randomPick(verbs);
  const filler = Math.random()<0.4 ? randomPick(fillers) : "";
  const closing = Math.random()<0.7 ? randomPick(closings) : "";
  const emoji = Math.random()<0.65 ? " " + randomPick(emojis) : "";
  const ojisan = Math.random()<0.28 ? randomPick(ojisanPhrases) : "";
  let s = tpl.replace("{opening}", opening).replace("{subject}", subject).replace("{verb}", verb).replace("{filler}", filler).replace("{closing}", closing).replace("{emoji}", emoji).replace("{ojisan}", ojisan);
  s = s.replace(/、\s+、/g,"、").replace(/\s+/g," ").trim();
  if(Math.random() < 0.12) s += "　" + randomPick(["ほんとだよね","まじで","うんうん","それな","わかる","間違いない","確かに"]);
  return {text:s, templateId: tplObj.id};
}

/* キャラ口調適用（個性強化） */
function applyCharacterTone(char, baseText){
  let text = baseText;
  if(char.name === "徳川"){ text = text.replace(/ね$/,"ね〜").replace(/よ$/,"よ〜"); }
  else if(char.name === "源頼朝"){ text = text.replace(/ね$/,"ぜ").replace(/よ$/,"ぜ").replace(/だ$/,"だぜ"); }
  else if(char.name === "福井 太郎"){ text += "　おじさんはそう思うよ"; }
  else if(char.name === "ツイ廃"){ text += "ｗｗｗ".repeat(Math.floor(Math.random()*3)+1); if(Math.random()<0.3)text="草。"+text; }
  else if(char.name === "アンパン 太郎"){ text = text.replace(/ね$/,"ねっ♪").replace(/よ$/,"よっ☆"); }
  
  // 徳川とアンパン太郎以外はおじさん構文を混ぜる確率を残す
  if(char.name !== "アンパン 太郎" && char.name !== "徳川" && Math.random() < 0.18) {
      text += "　" + randomPick(ojisanPhrases);
  }
  return text;
}

const chatBox = document.getElementById('chatBox');
const messageForm = document.getElementById('messageForm');
const userMessage = document.getElementById('userMessage');
const newBadge = document.getElementById('newBadge');

function createMessageElement(msg){
  const row = document.createElement('div');
  row.className = 'message-row ' + (msg.who === 'あなた' ? 'row-me' : 'msg-other');
  row.dataset.id = msg.id;
  row.dataset.who = msg.who;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  const char = characters.find(c=>c.name===msg.who);
  avatar.style.background = char ? char.color : '#999';
  avatar.textContent = msg.who.slice(0,2);

  const bubbleWrap = document.createElement('div');
  bubbleWrap.className = 'bubble-wrap';

  if(msg.deleted){
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (msg.who==='あなた' ? ' me' : '');
    bubble.innerHTML = '<span class="deleted">このメッセージは削除されました</span>';
    bubbleWrap.appendChild(bubble);
    const meta = document.createElement('div'); meta.className='meta';
    const timeEl = document.createElement('div'); timeEl.className='time'; timeEl.textContent = msg.time;
    meta.appendChild(timeEl);
    bubbleWrap.appendChild(meta);
  } else {
    if(msg.replyToId){
      const preview = document.createElement('div'); preview.className='reply-preview';
      const ref = messages.find(m=>m.id===msg.replyToId);
      preview.textContent = ref ? (ref.who + '：' + (ref.deleted ? '（削除済）' : ref.text.slice(0,80))) : '（参照先が見つかりません）';
      bubbleWrap.appendChild(preview);
    }
    if(msg.who !== 'あなた'){
      const nameEl = document.createElement('div'); nameEl.className='name'; nameEl.textContent = msg.who;
      bubbleWrap.appendChild(nameEl);
    }
    const bubble = document.createElement('div'); bubble.className = 'bubble' + (msg.who==='あなた' ? ' me' : '');
    bubble.setAttribute('role','article');
    bubble.innerHTML = '<div>' + escapeHtml(msg.text).replace(/\n/g,'<br>') + '</div>';
    if(msg.edited) bubble.innerHTML += '<div class="edited">編集済み</div>';
    bubbleWrap.appendChild(bubble);

    const meta = document.createElement('div'); meta.className='meta';
    const timeEl = document.createElement('div'); timeEl.className='time'; timeEl.textContent = msg.time;
    meta.appendChild(timeEl);

    // 既読表示
    const readEl = document.createElement('div'); readEl.className='small';
    if(msg.readBy && msg.readBy['あなた']) readEl.textContent = '既読';
    meta.appendChild(readEl);

    // いいね表示
    const likeEl = document.createElement('div'); likeEl.className='like-count';
    likeEl.textContent = (msg.likes && msg.likes>0) ? '👍 '+msg.likes : '';
    meta.appendChild(likeEl);

    bubbleWrap.appendChild(meta);

    // 操作ボタン群
    const controls = document.createElement('div'); controls.className='controls';
    if(msg.who === 'あなた'){
      const editBtn = document.createElement('button'); editBtn.className='btn'; editBtn.textContent='編集';
      editBtn.onclick = ()=>startEdit(msg.id);
      const delBtn = document.createElement('button'); delBtn.className='btn'; delBtn.textContent='削除';
      delBtn.onclick = ()=>deleteMessage(msg.id);
      controls.appendChild(editBtn); controls.appendChild(delBtn);
    } else {
      const replyBtn = document.createElement('button'); replyBtn.className='btn'; replyBtn.textContent='返信';
      replyBtn.onclick = ()=>startReply(msg.id);
      const likeBtn = document.createElement('button'); likeBtn.className='btn'; likeBtn.textContent='👍';
      likeBtn.onclick = ()=>likeMessage(msg.id);
      controls.appendChild(replyBtn); controls.appendChild(likeBtn);
    }
    bubbleWrap.appendChild(controls);
  }

  if(msg.who === 'あなた'){
    row.appendChild(bubbleWrap);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubbleWrap);
  }
  return row;
}

function renderMessages(){
  chatBox.innerHTML = '';
  const fragment = document.createDocumentFragment();
  messages.forEach(m=>{
    fragment.appendChild(createMessageElement(m));
  });
  chatBox.appendChild(fragment);
  attachObserversToMessages();
}

let observer = null;
function attachObserversToMessages(){
  if(observer) observer.disconnect();
  observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const id = entry.target.dataset.id;
        markAsRead(id, 'あなた');
      }
    });
  }, {threshold: 0.6});
  const items = chatBox.querySelectorAll('.message-row');
  items.forEach(item => observer.observe(item));
}

function markAsRead(msgId, who){
  const msg = messages.find(m=>m.id===msgId);
  if(!msg) return;
  msg.readBy = msg.readBy || {};
  if(!msg.readBy[who]){
    msg.readBy[who] = true;
    saveMessages();
    const el = chatBox.querySelector(`[data-id="${msgId}"] .meta .small`);
    if(el) el.textContent = '既読';
  }
}

function isUserAtBottom(thresholdPx=80){
  const scrollBottom = chatBox.scrollHeight - chatBox.clientHeight - chatBox.scrollTop;
  return scrollBottom <= thresholdPx;
}

let unseenCount = 0;
function handleNewMessageUI(){
  if(isUserAtBottom()){
    scrollToBottom(true);
    newBadge.style.display = 'none';
    unseenCount = 0;
  } else {
    unseenCount++;
    newBadge.textContent = `新着 (${unseenCount})`;
    newBadge.style.display = 'block';
  }
}
newBadge.addEventListener('click', ()=>{ scrollToBottom(true); newBadge.style.display='none'; unseenCount=0; });

function scrollToBottom(smooth=true){
  if(smooth) chatBox.scrollTo({top: chatBox.scrollHeight, behavior:'smooth'});
  else chatBox.scrollTop = chatBox.scrollHeight;
}

let editingId = null;
let replyToId = null;

function addMessage(msg){
  messages.push(msg);
  if(messages.length > MAX_MESSAGES) messages = messages.slice(messages.length - MAX_MESSAGES);
  saveMessages();
  renderMessages();
  handleNewMessageUI();
}

messageForm.addEventListener('submit', (e)=>{
  e.preventDefault();
  const raw = userMessage.value || '';
  const text = raw.trim();
  if(!text) return;
  
  if(editingId){
    const msg = messages.find(m=>m.id===editingId);
    if(msg){
      msg.text = text;
      msg.edited = true;
      saveMessages();
      editingId = null;
      messageForm.querySelector('button').textContent = '送信';
      replyToId = null;
      userMessage.value = '';
      userMessage.placeholder = 'メッセージを入力（Enterで送信、Shift+Enterで改行）'; // プレースホルダーをリセット
      renderMessages();
      scrollToBottom(true);
    }
    return;
  }
  
  const msg = { id: uid('msg'), who:'あなた', text, time: nowTime(), replyToId: replyToId || null, edited:false, deleted:false, readBy:{}, templateId:null, likes:0 };
  addMessage(msg);
  userMessage.value = '';
  userMessage.focus();
  replyToId = null;
  userMessage.placeholder = 'メッセージを入力（Enterで送信、Shift+Enterで改行）'; // ★ここでプレースホルダーをリセット★
  
  setTimeout(()=>autoReplyToUser(msg), Math.floor(Math.random()*1200)+500);
});

function startEdit(msgId){
  const msg = messages.find(m=>m.id===msgId);
  if(!msg) return;
  editingId = msgId;
  userMessage.value = msg.text;
  userMessage.focus();
  messageForm.querySelector('button').textContent = '保存';
}

function deleteMessage(msgId){
  if(!confirm('このメッセージを削除しますか？')) return;
  const msg = messages.find(m=>m.id===msgId);
  if(!msg) return;
  msg.deleted = true;
  saveMessages();
  renderMessages();
}

function startReply(msgId){
  replyToId = msgId;
  const ref = messages.find(m=>m.id===msgId);
  if(ref){
    userMessage.focus();
    userMessage.placeholder = `返信: ${ref.who}「${ref.text.slice(0,40)}」 — Enterで送信`;
  }
}

function likeMessage(msgId){
  const msg = messages.find(m=>m.id===msgId);
  if(!msg) return;
  msg.likes = (msg.likes||0) + 1;
  saveMessages();
  renderMessages();
  if(msg.templateId){
    const tpl = templates.find(t=>t.id===msg.templateId);
    if(tpl){ tpl.weight = (tpl.weight || 1) + 0.4; saveTemplates(); }
  }
}

function autoReplyToUser(userMsg){
  const replier = randomPick(characters);
  const base = generateBaseSentence();
  let text = applyCharacterTone(replier, base.text);
  const quoted = userMsg.text.length > 40 ? userMsg.text.slice(0,40) + '…' : userMsg.text;
  text += `（返信:「${quoted}」）`;
  const msg = { id: uid('msg'), who: replier.name, text, time: nowTime(), replyToId: userMsg.id, edited:false, deleted:false, readBy:{}, templateId: base.templateId, likes:0 };
  addMessage(msg);
  const tpl = templates.find(t=>t.id===base.templateId);
  if(tpl){ tpl.weight = (tpl.weight || 1) + 0.6; saveTemplates(); }
}

let autoRunning = true;
function scheduleAutoMessage(minDelay=1200, maxDelay=5000){
  const delay = Math.floor(Math.random()*(maxDelay-minDelay)) + minDelay;
  setTimeout(()=>{
    if(!autoRunning) return;
    postAutoMessage();
    scheduleAutoMessage(1000, 6000);
  }, delay);
}
function postAutoMessage(){
  const char = randomPick(characters);
  const base = generateBaseSentence();
  const text = applyCharacterTone(char, base.text);
  const msg = { id: uid('msg'), who: char.name, text, time: nowTime(), replyToId:null, edited:false, deleted:false, readBy:{}, templateId: base.templateId, likes:0 };
  addMessage(msg);
}

/* -------------------------
   初期化・復元・UIイベント
   ------------------------- */
function seedIfEmpty(){
  if(messages.length === 0){
    const seeds = [
      {who:"徳川", text:"おはようございます〜、今日はいい日になりそうだね😄"},
      {who:"源頼朝", text:"おう、今日はのんびりしようぜ"},
      {who:"福井 太郎", text:"コーヒー飲んでるよ、よかったら一緒にどう？☕️"}
    ];
    seeds.forEach(s=>{
      messages.push({ id: uid('msg'), who: s.who, text: s.text, time: nowTime(), replyToId:null, edited:false, deleted:false, readBy:{}, templateId:null, likes:0 });
    });
    saveMessages();
  }
}

function init(){
  loadState();
  seedIfEmpty();
  renderMessages();
  scheduleAutoMessage(800, 3000);
  document.addEventListener('visibilitychange', ()=>{
    autoRunning = !document.hidden;
    if(autoRunning) scheduleAutoMessage(800,3000);
  });
  chatBox.addEventListener('scroll', ()=>{
    if(isUserAtBottom()){
      newBadge.style.display = 'none';
      unseenCount = 0;
    }
  });
  userMessage.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); messageForm.requestSubmit(); }
  });
  setTimeout(()=>scrollToBottom(false), 200);
}

init();

let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{ if(isUserAtBottom()) scrollToBottom(false); }, 200);
});
</script>
</body>
</html>
