<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オセロ ゲーム選択</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 280px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .card p {
            font-size: 0.9rem;
            color: #777;
            line-height: 1.6;
        }

        .btn {
            margin-top: 20px;
            background-color: var(--accent-color);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .card:hover .btn {
            background-color: #219150;
        }

        @media (max-width: 600px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Othello Game Portal</h1>
    <p class="subtitle">プレイモードを選択してください</p>

    <div class="card-container">
        <a href="human-vs-ai.html" class="card">
            <div class="icon">👤 🆚 🤖</div>
            <h2>人間 vs AI</h2>
            <p>あなたの実力を試しましょう。<br>AIに勝てるか挑戦！</p>
            <div class="btn">プレイ開始</div>
        </a>

        <a href="ai-vs-ai.html" class="card">
            <div class="icon">🤖 🆚 🤖</div>
            <h2>AI vs AI</h2>
            <p>高度なアルゴリズム同士の対局。<br>戦略のぶつかり合いを観戦。</p>
            <div class="btn">観戦する</div>
        </a>
    </div>
</div>

</body>
</html>
