# ==========================================
# サイト基本
# ==========================================
title: "TTS-Note"
description: "趣味で運営しているNoteサイト"
url: "https://tts2525.github.io"
baseurl: "/hp"

lang: ja
timezone: Asia/Tokyo

# ==========================================
# カテゴリ設定（政治・社会の2本柱）
# ==========================================
categories:
  - blog
  - opinion

# 表示名の日本語マッピング（テンプレート側で参照する）
category_names:
  blog: "BLOG"
  opinion: "主張"

# 各カテゴリのテーマカラー（ラベル・アクセント用）
category_colors:
  blog: "#b23a48"   # くすんだ赤
  opinion: "#2f6690"    # くすんだ青

# ==========================================
# Markdown / ビルド設定
# ==========================================
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:categories/:year/:month/:day/:title/

# ==========================================
# コレクション・プラグイン（GitHub Pages対応版のみ使用可）
# ==========================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# 記事一覧のデフォルトソート（新しい順）
sort_order: descending

# トップページに表示する新着記事数
paginate: 10
paginate_path: "/page/:num/"

# ==========================================
# デフォルトのFront Matter設定
# ==========================================
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      comments: false

# Jekyllのビルド対象外にするファイル
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
